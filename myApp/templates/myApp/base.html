<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Aira — Record your visit. Understand your care.{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Aira logo palette — navy + teal on cool ivory */
    --navy: #1B3B7D;
    --navy-deep: #152E63;
    --teal: #2EB2C2;
    --teal-deep: #249DA8;

    --ivory: #F2F6FA;
    --ink: #1A2E4A;
    --sage: #5E7084;
    --white: #FFFFFF;
    --line: rgba(27, 59, 125, 0.12);

    --navy-rgb: 27, 59, 125;
    --teal-rgb: 46, 178, 194;

    /* Semantic aliases used across templates */
    --pine: var(--navy);
    --terracotta: var(--teal);
    --terracotta-deep: var(--teal-deep);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--ivory);
    color: var(--ink);
    font-family: 'Source Sans 3', sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  a { color: inherit; text-decoration: none; }

  main { flex: 1 0 auto; }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 28px;
  }

  /* ---------- Top bar ---------- */
  header {
    position: relative;
    padding: 28px 0 0;
    z-index: 200;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .brand {
    display: inline-flex;
    align-items: center;
  }
  .brand-logo {
    height: 40px;
    width: auto;
    display: block;
  }
  @media (max-width: 480px) {
    .brand-logo { height: 34px; }
  }

  .nav-menu {
    position: relative;
    flex-shrink: 0;
  }

  .nav-toggle {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    width: 44px;
    height: 44px;
    padding: 0;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--white);
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .nav-toggle:hover { border-color: var(--pine); }
  .nav-toggle:focus-visible {
    outline: 2px solid var(--pine);
    outline-offset: 2px;
  }
  .nav-toggle-bar {
    display: block;
    width: 20px;
    height: 2px;
    border-radius: 2px;
    background: var(--pine);
    transition: transform 0.2s ease, opacity 0.2s ease;
  }
  header.nav-open .nav-toggle-bar:nth-child(1) {
    transform: translateY(7px) rotate(45deg);
  }
  header.nav-open .nav-toggle-bar:nth-child(2) {
    opacity: 0;
  }
  header.nav-open .nav-toggle-bar:nth-child(3) {
    transform: translateY(-7px) rotate(-45deg);
  }

  .site-nav {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    flex-direction: column;
    gap: 0;
    min-width: 188px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 6px 0;
    box-shadow: 0 10px 28px rgba(var(--navy-rgb), 0.1);
  }
  header.nav-open .site-nav { display: flex; }
  .site-nav a {
    font-size: 0.95rem;
    color: var(--sage);
    font-weight: 600;
    padding: 11px 20px;
    border-bottom: none;
  }
  .site-nav a:hover {
    color: var(--navy);
    background: rgba(var(--teal-rgb), 0.08);
  }
  .site-nav a.active {
    color: var(--navy);
    background: rgba(var(--teal-rgb), 0.12);
    border-bottom: none;
  }
  @media (prefers-reduced-motion: reduce) {
    .nav-toggle-bar { transition: none; }
  }

  /* ---------- Hero ---------- */
  .hero {
    padding: 56px 0 24px;
    text-align: center;
  }
  .hero h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(2rem, 5.5vw, 2.85rem);
    line-height: 1.15;
    color: var(--ink);
    max-width: 560px;
    margin: 0 auto 18px;
    letter-spacing: -0.01em;
  }
  .hero p {
    font-size: 1.2rem;
    color: var(--sage);
    max-width: 480px;
    margin: 0 auto;
  }

  /* ---------- Record button ---------- */
  .record-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 0 36px;
  }

  .record-btn {
    position: relative;
    width: 168px;
    height: 168px;
    border-radius: 50%;
    background: linear-gradient(165deg, var(--navy) 25%, var(--teal) 100%);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 28px rgba(var(--navy-rgb), 0.28);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .record-btn::before {
    content: "";
    position: absolute;
    inset: -14px;
    border-radius: 50%;
    border: 2px solid rgba(var(--teal-rgb), 0.35);
    animation: pulse 2.6s ease-out infinite;
  }
  @media (prefers-reduced-motion: reduce) {
    .record-btn::before { animation: none; }
  }
  @keyframes pulse {
    0%   { transform: scale(1);    opacity: 0.7; }
    70%  { transform: scale(1.18); opacity: 0; }
    100% { transform: scale(1.18); opacity: 0; }
  }
  .record-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(var(--navy-rgb), 0.34);
    background: linear-gradient(165deg, var(--navy-deep) 25%, var(--teal-deep) 100%);
  }
  .record-btn:focus-visible {
    outline: 3px solid var(--teal);
    outline-offset: 6px;
  }
  .record-btn svg { width: 56px; height: 56px; }

  .record-label {
    margin-top: 22px;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.35rem;
    color: var(--pine);
  }
  .record-sub {
    margin-top: 6px;
    font-size: 1rem;
    color: var(--sage);
  }

  /* ---------- Three steps ---------- */
  .steps {
    padding: 40px 0 8px;
    border-top: 1px solid var(--line);
  }
  .steps-grid {
    display: grid;
    gap: 36px;
    margin-top: 8px;
  }
  .step {
    display: flex;
    gap: 18px;
    align-items: flex-start;
    margin-bottom: 4px;
  }
  .step-mark {
    flex: none;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--pine);
    color: var(--white);
    font-family: 'Fraunces', serif;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.05rem;
  }
  .step h3 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.15rem;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .step p {
    color: var(--sage);
    font-size: 1.02rem;
  }

  /* ---------- Reassurance ---------- */
  .reassure {
    padding: 56px 0;
    text-align: center;
  }
  .reassure p {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-style: italic;
    font-size: 1.4rem;
    color: var(--pine);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.4;
  }

  /* ---------- Trust strip ---------- */
  .trust {
    padding: 28px 0 48px;
    border-top: 1px solid var(--line);
    text-align: center;
  }
  .trust p {
    color: var(--sage);
    font-size: 0.95rem;
    max-width: 460px;
    margin: 0 auto;
  }
  .trust strong { color: var(--pine); font-weight: 600; }

  /* ---------- Inner content pages ---------- */
  .page {
    padding: 48px 0 64px;
  }
  .page-eyebrow {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--terracotta);
    margin-bottom: 12px;
  }
  .page h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(1.9rem, 4.5vw, 2.5rem);
    line-height: 1.15;
    color: var(--ink);
    letter-spacing: -0.01em;
    margin-bottom: 10px;
  }
  .page .updated {
    color: var(--sage);
    font-size: 1rem;
    margin-bottom: 32px;
  }
  .page h2 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.3rem;
    color: var(--pine);
    margin: 32px 0 10px;
  }
  .page h3 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.1rem;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .page p {
    color: var(--ink);
    font-size: 1.05rem;
    margin-bottom: 14px;
  }
  .page ul {
    margin: 0 0 16px 1.1rem;
    color: var(--ink);
    font-size: 1.05rem;
  }
  .page li { margin-bottom: 8px; }
  .page a:not(.brand) {
    color: var(--teal-deep);
    border-bottom: 1px solid rgba(var(--teal-rgb), 0.45);
  }
  .page a:not(.brand):hover { border-bottom-color: var(--teal-deep); }

  .callout {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px 22px;
    margin: 28px 0;
  }
  .callout p { margin-bottom: 0; color: var(--sage); }

  /* ---------- FAQ ---------- */
  .faq-item {
    padding: 20px 0;
    border-top: 1px solid var(--line);
  }
  .faq-q {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.12rem;
    color: var(--pine);
    margin-bottom: 8px;
  }
  .faq-a {
    color: var(--ink);
    font-size: 1.02rem;
  }
  .faq-a a {
    color: var(--teal-deep);
    border-bottom: 1px solid rgba(var(--teal-rgb), 0.45);
  }

  /* ---------- Contact cards ---------- */
  .contact-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 18px;
  }
  .contact-card h3 { margin-bottom: 8px; }
  .contact-card a {
    color: var(--teal-deep);
    font-weight: 600;
    border-bottom: 1px solid rgba(var(--teal-rgb), 0.45);
  }

  /* ---------- Footer ---------- */
  footer {
    flex-shrink: 0;
    border-top: 1px solid var(--line);
    padding: 28px 0 40px;
    margin-top: 24px;
  }
  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .footer-row > p {
    color: var(--sage);
    font-size: 0.9rem;
  }
  .footer-links {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }
  .footer-link {
    font-size: 0.9rem;
    color: var(--pine);
    font-weight: 600;
    border-bottom: 1px solid var(--pine);
    padding-bottom: 1px;
  }

  @media (max-width: 480px) {
    .record-btn { width: 144px; height: 144px; }
    .record-btn svg { width: 48px; height: 48px; }
  }
</style>
{% block head_extra %}{% endblock %}
</head>
<body>

  <header id="siteHeader">
    <div class="wrap header-row">
      <a href="{% url 'home' %}" class="brand" aria-label="Aira — home">
        <img src="https://res.cloudinary.com/dw5tnpylt/image/upload/v1781974560/Aira_Logo-05_aqtxuj.png" alt="Aira" class="brand-logo">
      </a>
      <div class="nav-menu">
        <button
          class="nav-toggle"
          id="navToggle"
          type="button"
          aria-label="Open menu"
          aria-expanded="false"
          aria-controls="siteNav"
        >
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
        </button>
        <nav id="siteNav" class="site-nav">
          <a href="{% url 'about' %}" class="{% if active == 'about' %}active{% endif %}">About</a>
          <a href="{% url 'faq' %}" class="{% if active == 'faq' %}active{% endif %}">FAQ</a>
          <a href="{% url 'privacy' %}" class="{% if active == 'privacy' %}active{% endif %}">Privacy</a>
          <a href="{% url 'terms' %}" class="{% if active == 'terms' %}active{% endif %}">Terms</a>
          <a href="{% url 'contact' %}" class="{% if active == 'contact' %}active{% endif %}">Contact</a>
        </nav>
      </div>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer>
    <div class="wrap footer-row">
      <p>&copy; 2026 Aira. Until every patient understands.</p>
      <div class="footer-links">
        <a href="{% url 'privacy' %}" class="footer-link">Privacy</a>
        <a href="{% url 'terms' %}" class="footer-link">Terms</a>
        <a href="{% url 'contact' %}" class="footer-link">Contact</a>
        <a href="{% url 'about' %}" class="footer-link">For healthcare providers &amp; partners →</a>
      </div>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
  <script>
  (function () {
    var header = document.getElementById("siteHeader");
    var toggle = document.getElementById("navToggle");
    var nav = document.getElementById("siteNav");
    if (!header || !toggle || !nav) return;

    function setOpen(open) {
      header.classList.toggle("nav-open", open);
      toggle.setAttribute("aria-expanded", open ? "true" : "false");
      toggle.setAttribute("aria-label", open ? "Close menu" : "Open menu");
    }

    toggle.addEventListener("click", function () {
      setOpen(!header.classList.contains("nav-open"));
    });

    document.addEventListener("click", function (ev) {
      if (!header.classList.contains("nav-open")) return;
      if (ev.target.closest(".nav-menu")) return;
      setOpen(false);
    });

    document.addEventListener("keydown", function (ev) {
      if (ev.key === "Escape") setOpen(false);
    });

    nav.querySelectorAll("a").forEach(function (link) {
      link.addEventListener("click", function () { setOpen(false); });
    });
  })();
  </script>
</body>
</html>
